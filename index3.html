<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина "Список товаров"</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #fff9c4;
            transition: background 0.4s, color 0.4s;
        }

        body.dark {
            background: #1a2a4a;
            color: white;
        }

        body.dark .card {
            background: #253a5e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .img {
            font-size: 48px;
            border-radius: 50px;
            padding: 15px;
            margin-bottom: 12px;
            display: inline-block;
        }

        .card h3 {
            margin: 0 0 6px;
            font-size: 16px;
        }

        .price {
            color: #888;
            font-size: 14px;
            margin: 0 0 14px;
        }

        button {
            background: #1e81b0;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #156a94;
        }

        button.added {
            background: #2ecc71;
        }

        button.added:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>
    <button id="theme-btn" onclick="toggleTheme()">Синяя тема</button>
    
    <h1>Список товаров в корзине</h1>

    <div class="cards">
        <div class="card">
            <div class="img" style="background: #f9ca74;">🍕</div>
            <h3>Пицца</h3>
            <p class="price">500 Р</p>
            <button onclick="buy(this)">Купить</button>
        </div>

        <div class="card">
            <div class="img" style="background: #a2a9bd;">🎧</div>
            <h3>Наушники</h3>
            <p class="price">2 990 р</p>
            <button onclick="buy(this)">Купить</button>
        </div>

        <div class="card">
            <div class="img" style="background: #53c28e;">📚</div>
            <h3>Книга</h3>
            <p class="price">300 Р</p>
            <button onclick="buy(this)">Купить</button>
        </div>

        <div class="card">
            <div class="img" style="background: #d1b37c;">🧸</div>
            <h3>Игрушка</h3>
            <p class="price">800 Р</p>
            <button onclick="buy(this)">Купить</button>
        </div>
    </div>

    <div class="total">
        <h2>Итого: <span id="total-amount">0</span> Р</h2>
    </div>
      <a href="index4.html" target="_blank"> 
    <button>Оформить покупку</button>
    <h3> <a href="index2.html" target="_blank">
            <button>Назад</button> </a></h3>
    <script>
        let total = 0;

        function toggleTheme() {
            document.body.classList.toggle("dark");
            const btn = document.getElementById("theme-btn");
            if (document.body.classList.contains("dark")) {
                btn.textContent = "Жёлтая тема";
            } else {
                btn.textContent = "Синяя тема";
            }
        }
        function buy(button) {
            const card = button.closest('.card');
            const priceElement = card.querySelector('.price');
            
            const priceText = priceElement.textContent;
            const price = parseInt(priceText.replace(/[^\d]/g, ''), 10);
            
            if (isNaN(price)) {
                console.error('Не удалось извлечь цену из элемента:', priceText);
                return;
            }
            if (button.classList.contains('added')) {
                total -= price;
                button.classList.remove('added');
                button.textContent = 'Купить';
            } else {
                total += price;
                button.classList.add('added');
                button.textContent = 'В корзине';
            }
            updateTotal();
        }
        function updateTotal() {
            document.getElementById('total-amount').textContent = total;
        }
    </script>
</body>
</html>
