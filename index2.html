<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наш магазин</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #fff9c4;
            transition: background 0.4s, color 0.4s;
            
        }

        body.dark {
            background: #1a2a4a;
            color: white;
        }

        body.dark .card {
            background: #253a5e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        body.dark .price {
            color: #aaa;
        }

        #theme-btn {
            background: #555;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }

        #theme-btn:hover {
            background: #333;
        }

        h2 {
            margin-bottom: 20px;
        }

        

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            width: 160px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

      .img {
      display: flex;
      justify-content: center; 
      align-items: center; 
      font-size: 48px;
      border-radius: 50%;
      padding: 15px;
      margin-bottom: 12px;
      background: #f9ca74; 
      width: 135px;     
      height: 135px;   
}

        }

        .card h3 {
            margin: 0 0 6px;
            font-size: 16px;
            
        }

        .price {
            color: #888;
            font-size: 14px;
            margin: 0 0 14px;
        }

        button {
            background: #1e81b0;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #156a94;
        }

        button.added {
            background: #2ecc71;
        }
    </style>
</head>
<body>
    <button id="theme-btn" onclick="toggleTheme()">Синяя тема</button>
    <span id="counter">🛒 Корзина: 0</span>

    <h1>Наш магазин</h1>

    <div class="cards">
        <div class="card">
            <div class="img" style="background: #f9ca74;">
                  <img src="пицца1.jpg" alt="class" width="130"> 
                 </div>
            <h3>Пицца</h3>
            <p class="price">500 Р</p>
            <button onclick="buy(this)">В корзину</button>
            <a href="index6.html" target="_blank">
            <button>перейти на товар</button></a> 
        </div>

        <div class="card">
            <div class="img" style="background: #a2a9bd;">
                <img src="наушник1.jpg" alt="class" width="130">
            </div>
            <h3>Наушники</h3>
            <p class="price">2 990 р</p>
            <button onclick="buy(this)">В корзину</button>
             <a href="index6.html" target="_blank">
            <button>перейти на товар</button></a> 
        </div>

        <div class="card">
            <div class="img" style="background: #53c28e;">
                <img src="книга1.jpg" alt="class" width="130">
            </div>
            <h3>Книга</h3>
            <p class="price">300 Р</p>
            <button onclick="buy(this)">В корзину</button>
             <a href="index7.html" target="_blank">
            <button>перейти на товар</button></a> 
        </div>

        <div class="card">
            <div class="img" style="background: #d1b37c;">
                <img src="игрушка1.jpg" alt="class" width="130">
            </div>
            <h3>Игрушка</h3>
            <p class="price">800 Р</p>
            <button onclick="buy(this)">В корзину</button>
             <a href="index8.html" target="_blank">
            <button>перейти на товар</button></a> 
        </div>
    </div>

    <script>
        let count = 0;

        function toggleTheme() {
            document.body.classList.toggle("dark");
            const btn = document.getElementById("theme-btn");
            if (document.body.classList.contains("dark")) {
                btn.textContent = "Жёлтая тема";
            } else {
                btn.textContent = "Синяя тема";
            }
        }

        function buy(btn) {
            const card = btn.closest('.card');
            if (btn.textContent === "В корзину") {
                btn.textContent = "Добавлено";
                btn.classList.add("added");
                count++;
            } else {
                btn.textContent = "";
                btn.classList.remove("added");
                count--;
            }
            document.getElementById("counter").textContent = "🛒 Корзина: " + count;
           
        }
    </script>

    <a href="index3.html" target="_blank">
    <button>Корзина</button></a> 
</body>
</html>
